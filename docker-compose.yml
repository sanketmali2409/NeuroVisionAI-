services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: neurovision-backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./logs:/app/logs
      - ./rag:/app/rag
      - ./neurovision.db:/app/neurovision.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: neurovision-frontend
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: neurovision-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
